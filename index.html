<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal research and blog website">
  <title>Cosmos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Orbitron:wght@400;600;700&display=swap"
    rel="stylesheet">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌌</text></svg>">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="scanline-overlay"></div>
  <canvas id="starfield"></canvas>

  <div id="app">
    <main id="main-content"></main>

    <div id="search-overlay">
      <div class="search-box">
        <div class="search-title">Search</div>
        <div class="search-input-row">
          <input type="text" id="search-input" placeholder="Type keywords..." autocomplete="off" spellcheck="false">
          <button class="pixel-btn" onclick="window.COSMOS.closeSearch()">&#x2715;</button>
        </div>
        <div id="search-results"></div>
      </div>
    </div>

    <footer>
      <span>&#9670;</span> COSMOS &nbsp;&middot;&nbsp; Powered by GitHub Pages &nbsp;&middot;&nbsp;
      <span>Made on the earth</span>
    </footer>
  </div>

  <div id="toast"></div>

  <!--
    Script load order (do not change):
      1. config.js  — your personal info (i18n + about)
      2. data.js    — auto-generated posts (run build.py to update)
      3. main.js    — site engine, never edit
  -->
  <script src="js/config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>

</body>

</html>
